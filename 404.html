<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — zzlab</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#09090b">
  <link rel="icon" href="images/logo-nobg.png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="images/logo-nobg-white.png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="images/app-icon.png">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#09090b;--text:#fafafa;--text-secondary:#a1a1aa;--font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
    body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
    .error-code{font-size:clamp(48px,8vw,72px);font-weight:700;letter-spacing:-0.04em;line-height:1.05;margin-bottom:16px}
    .error-msg{font-size:17px;color:var(--text-secondary);margin-bottom:32px;line-height:1.6}
    a{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;font-size:14px;font-weight:500;border-radius:8px;text-decoration:none;background:var(--text);color:var(--bg);transition:opacity 0.2s}
    a:hover{opacity:0.85}
  </style>
</head>
<body>
  <div>
    <div class="error-code">404</div>
    <p class="error-msg">This page doesn't exist. Maybe it moved, maybe it never did.</p>
    <a href="/">Back to zzlab</a>
  </div>
</body>
</html>
